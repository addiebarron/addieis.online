    build: app
    restart: unless-stopped
    ports:
      - 3000:3000
    environment:
      APP_ENV: ${APP_ENV}
      CLOUDINARY_URL: ${CLOUDINARY_URL}
      # PGPASSWORD: ${PGPASSWORD}
      # PGUSER: addie
      # PGHOST: db
      # PGDATABASE: database
      # PGPORT: 5432
    networks:
      - addie

